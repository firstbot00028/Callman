[incoming]
exten => 1000,1,Answer()
 same => n,Playback(hello-world)

 ; record user voice
 same => n,Record(/tmp/input.wav,5)

 ; send to Render AI
 same => n,System(curl -X POST https://YOUR-APP.onrender.com/process \
  -H "Content-Type: application/json" \
  -d '{"text":"urgent"}')

 ; 🔥 for now static test (later dynamic)
 same => n,Playback(vm-goodbye)

 same => n,Hangup()
